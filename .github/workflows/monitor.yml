name: おがまる空き状況監視

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      test_notification:
        description: "空き状況に関係なくテスト通知を送る"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ogamaru-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TARGET_DATE: "2026/09/18"
      PACKAGE_URL: "https://www.ogasawarakaiun.co.jp/rsys/s5002packagelist.php"
      SHIP_URL: "https://www.ogasawarakaiun.co.jp/rsys/s0102ticketlist.php"
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TEST_NOTIFICATION: ${{ inputs.test_notification || 'false' }}

    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Node.jsを準備
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: npmレジストリを公開版に固定
        run: npm config set registry https://registry.npmjs.org/

      - name: パッケージをインストール
        run: npm ci --no-audit --no-fund

      - name: Chromiumをインストール
        run: npx playwright install --with-deps chromium

      - name: 空き状況を確認
        run: npm run check

      - name: 判定用画像を保存
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-debug-${{ github.run_number }}
          path: debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: 状態変化を保存
        run: |
          if git diff --quiet -- state.json; then
            echo "状態変化なし"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "監視状態を更新 [skip ci]"
          git push
